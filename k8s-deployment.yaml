apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        # This is the line we updated with your information:
        image: 250585564599.dkr.ecr.eu-west-1.amazonaws.com/my-app-repo:latest
        ports:
        - containerPort: 80